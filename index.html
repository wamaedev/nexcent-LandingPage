<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexcent</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>

  <header class="nav-bar">
    <div class="nav-left">
      <img id="nav-bar-img" src="images/Logo.png" alt="A company logo">
    </div>
    
    <div class="nav-right">
     <a href="#" class="home-link">Home</a>

     <div class="nav-group"> 
        <a href="#">Features</a>
        <a href="#">Community</a>
        <a href="#">Blog</a>
        <a href="#">Pricing</a>
        <button>Register Now &rarr;</button>
     </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Lessons and insights <span>from 8 years</span></h1>
      <p>Where to grow your business as a photographer site or social media?</p>
      <button>Register</button>
    </div>

    <div class="hero-img">
      <img src="images/Illustration.png" alt="A person using images to illustrate.">
    </div>

    <div>
      
    </div>

  </section>

  <article class="clients">
    <div class="clients-header">
      <h2>Our Clients</h2>
      <p>We have been working with some Fortune 500+ clients</p>
    </div>

    <div class="clients-logos">
      <img src="images/Logo.jpg" alt="Client 1">
      <img src="images/Logo (1).jpg" alt="Client 2">
      <img src="images/Logo (2).jpg" alt="Client 3">
      <img src="images/Logo (3).jpg" alt="Client 4">
      <img src="images/Logo (4).jpg" alt="Client 5">
      <img src="images/Logo (5).jpg" alt="Client 6">
      <img src="images/Logo (6).jpg" alt="Client 7">
    </div>
  </article>

  <section class="community">
    <div class="community-header">
      <h3>Manage your entire community in a single system</h3>
      <p>Who is Nextcent suitable for?</p>
    </div>
  </section>

</html>
